<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Orders | Faiz Store Admin</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        .admin-orders-container {
            padding: 100px 5%;
        }

        .orders-table {
            width: 100%;
            border-collapse: collapse;
            background: var(--card-bg);
            border-radius: 15px;
            overflow: hidden;
            margin-top: 2rem;
        }

        .orders-table th,
        .orders-table td {
            padding: 1.2rem;
            text-align: left;
            border-bottom: 1px solid var(--glass-border);
        }

        .orders-table th {
            background: rgba(255, 255, 255, 0.05);
            color: var(--primary-color);
        }

        .status-badge {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .status-pending {
            background: rgba(255, 193, 7, 0.2);
            color: #ffc107;
        }

        .status-delivered {
            background: rgba(16, 185, 129, 0.2);
            color: #10b981;
        }

        .status-cancelled {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
        }

        .item-details {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-top: 5px;
        }

        .btn-status {
            padding: 6px 12px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: 600;
            transition: 0.3s;
        }

        .btn-deliver {
            background: #10b981;
            color: white;
            margin-right: 5px;
        }

        .btn-cancel {
            background: #ef4444;
            color: white;
        }
    </style>
</head>

<body class="dark-theme">
    <nav class="navbar">
        <div class="logo">
            <img src="logo.png" alt="Faiz Store Logo" style="height: 40px; margin-right: 10px;">
            Faiz <span>Store</span>
            <small
                style="font-size: 0.8rem; margin-left: 10px; opacity: 0.7; color: var(--primary-color);">Orders</small>
        </div>
        <ul class="nav-links">
            <li><a href="admin.html">Inventory</a></li>
            <li><a href="admin_orders.html" class="active">Orders</a></li>
            <li><a href="admin_offers.html">Offers</a></li>
            <li><a href="billing.html">POS</a></li>
        </ul>
    </nav>

    <main class="admin-orders-container">
        <div class="section-header">
            <h2>Customer Orders</h2>
            <p>Track and fulfill orders from your online customers.</p>
        </div>

        <table class="orders-table">
            <thead>
                <tr>
                    <th>Order ID</th>
                    <th>Customer & Address</th>
                    <th>Items</th>
                    <th>Total</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="adminOrdersList">
                <!-- Orders injected by JS -->
            </tbody>
        </table>
    </main>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <script src="data.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const ordersList = document.getElementById('adminOrdersList');

            async function renderAdminOrders(preFetchedOrders = null) {
                const orders = preFetchedOrders || await getOrders();
                const users = await getUsers();
                ordersList.innerHTML = '';

                if (orders.length === 0) {
                    ordersList.innerHTML = '<tr><td colspan="6" style="text-align: center; padding: 3rem; color: var(--text-muted);">No orders placed yet.</td></tr>';
                    return;
                }

                // Show newest orders first
                [...orders].reverse().forEach(order => {
                    const user = users.find(u => u.id === order.userId) || { name: 'Guest', address: 'N/A' };
                    const itemsSummary = order.items.map(item => `${item.name} x${item.quantity}`).join(', ');

                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td><strong>#${order.id}</strong><br><small>${order.date}</small></td>
                        <td>
                            <strong>${user.name}</strong><br>
                            <span style="font-size: 0.8rem; color: var(--text-muted);">${user.address}</span>
                        </td>
                        <td><div class="item-details">${itemsSummary}</div></td>
                        <td>Rs. ${order.total.toLocaleString()}</td>
                        <td><span class="status-badge status-${order.status.toLowerCase()}">${order.status}</span></td>
                        <td>
                            ${order.status === 'Pending' ? `
                                <button class="btn-status btn-deliver" onclick="updateOrderStatus(${order.id}, 'Delivered')">Deliver</button>
                                <button class="btn-status btn-cancel" onclick="updateOrderStatus(${order.id}, 'Cancelled')">Cancel</button>
                            ` : '<span style="color: var(--text-muted); font-size: 0.8rem;">Completed</span>'}
                        </td>
                    `;
                    ordersList.appendChild(row);
                });
            }

            // Real-time listener
            onOrdersChange((updatedOrders) => {
                renderAdminOrders(updatedOrders);
            });

            window.updateOrderStatus = async (orderId, newStatus) => {
                let orders = await getOrders();
                const orderIndex = orders.findIndex(o => o.id == orderId);
                if (orderIndex !== -1) {
                    orders[orderIndex].status = newStatus;
                    await saveOrders(orders);
                    alert(`Order #${orderId} marked as ${newStatus}`);
                }
            };

            await renderAdminOrders();
        });
    </script>
</body>

</html>
