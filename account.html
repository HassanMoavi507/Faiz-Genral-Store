<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Account - Faiz Store</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .account-container {
            padding: 120px 10% 50px;
        }

        .account-grid {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 30px;
        }

        .profile-card,
        .orders-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 30px;
            backdrop-filter: blur(12px);
        }

        .order-item {
            border-bottom: 1px solid var(--glass-border);
            padding: 15px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .order-status {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .status-pending {
            background: rgba(255, 193, 7, 0.2);
            color: #ffc107;
        }

        .status-delivered {
            background: rgba(16, 185, 129, 0.2);
            color: #10b981;
        }

        .logout-btn {
            background: #ef4444;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 20px;
            width: 100%;
        }
    </style>
</head>

<body>
    <nav class="navbar">
        <div class="logo">
            <img src="logo.png" alt="Faiz Store Logo" style="height: 50px; margin-right: 10px;">
            Faiz <span>Store</span>
        </div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="account.html" class="active">My Account</a></li>
            <li id="navAdmin" style="display: none;"><a href="admin.html">Admin</a></li>
        </ul>
    </nav>

    <div class="account-container">
        <div class="account-grid">
            <div class="profile-card">
                <h2>My Profile</h2>
                <div id="profileInfo" style="margin-top: 20px;">
                    <!-- User Info Here -->
                </div>
                <button class="logout-btn" id="logoutBtn">Logout</button>
            </div>
            <div class="orders-card">
                <h2>Order History</h2>
                <div id="ordersList" style="margin-top: 20px;">
                    <!-- Orders Here -->
                </div>
            </div>
        </div>
    </div>

    <script src="data.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const user = getCurrentUser();
            if (!user) {
                window.location.href = 'index.html';
                return;
            }

            // Render Profile
            const profileInfo = document.getElementById('profileInfo');
            profileInfo.innerHTML = `
                <p><strong>Name:</strong> ${user.name}</p>
                <p><strong>Email:</strong> ${user.email}</p>
                <p><strong>Address:</strong> ${user.address}</p>
            `;

            // Render Orders
            const orders = getOrders().filter(o => o.userId === user.id);
            const ordersList = document.getElementById('ordersList');
            if (orders.length === 0) {
                ordersList.innerHTML = '<p style="color: var(--text-muted)">No orders found yet.</p>';
            } else {
                orders.reverse().forEach(order => {
                    const div = document.createElement('div');
                    div.className = 'order-item';
                    div.innerHTML = `
                        <div>
                            <strong>Order #${order.id}</strong><br>
                            <small style="color: var(--text-muted)">${order.date}</small>
                        </div>
                        <div>Rs. ${order.total.toLocaleString()}</div>
                        <div class="order-status status-${order.status.toLowerCase()}">${order.status}</div>
                    `;
                    ordersList.appendChild(div);
                });
            }

            document.getElementById('logoutBtn').addEventListener('click', () => {
                logout();
                window.location.href = 'index.html';
            });

            // Admin Link Visibility Logic
            const navAdmin = document.getElementById('navAdmin');
            const logoImg = document.querySelector('.navbar .logo img');
            let logoClickCount = 0;
            let clickTimeout;

            function checkAdminVisibility() {
                if (localStorage.getItem('isAdminAuthorized') === 'true') {
                    if (navAdmin) navAdmin.style.display = 'block';
                }
            }

            if (logoImg) {
                logoImg.style.cursor = 'pointer';
                logoImg.addEventListener('click', () => {
                    logoClickCount++;
                    clearTimeout(clickTimeout);
                    clickTimeout = setTimeout(() => {
                        logoClickCount = 0;
                    }, 3000);

                    if (logoClickCount === 5) {
                        if (navAdmin) {
                            const isHidden = navAdmin.style.display === 'none';
                            navAdmin.style.display = isHidden ? 'block' : 'none';
                            alert(isHidden ? 'Admin access enabled!' : 'Admin access hidden!');
                        }
                        logoClickCount = 0;
                    }
                });
            }
            checkAdminVisibility();
        });
    </script>
</body>

</html>
