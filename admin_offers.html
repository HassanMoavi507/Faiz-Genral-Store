<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Offers | Faiz Store Admin</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        .admin-offers-container {
            padding: 100px 5%;
        }

        .offers-table {
            width: 100%;
            border-collapse: collapse;
            background: var(--card-bg);
            border-radius: 15px;
            overflow: hidden;
            margin-top: 2rem;
        }

        .offers-table th,
        .offers-table td {
            padding: 1.2rem;
            text-align: left;
            border-bottom: 1px solid var(--glass-border);
        }

        .offers-table th {
            background: rgba(255, 255, 255, 0.05);
            color: gold;
        }

        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 60px;
            height: 30px;
        }

        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #444;
            transition: .4s;
            border-radius: 34px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 22px;
            width: 22px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked+.slider {
            background-color: gold;
        }

        input:checked+.slider:before {
            transform: translateX(30px);
        }

        .admin-nav {
            display: flex;
            gap: 20px;
            margin-bottom: 2rem;
        }

        .admin-nav a {
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 600;
        }

        .admin-nav a.active {
            color: gold;
            border-bottom: 2px solid gold;
        }
    </style>
</head>

<body class="dark-theme">
    <nav class="navbar">
        <div class="logo">
            <img src="logo.png" alt="Faiz Store Logo" style="height: 40px; margin-right: 10px;">
            Faiz <span>Store</span>
            <small style="font-size: 0.8rem; margin-left: 10px; opacity: 0.7; color: gold;">Manage Offers</small>
        </div>
        <ul class="nav-links">
            <li><a href="admin.html">Dashboard</a></li>
            <li><a href="admin_orders.html">Orders</a></li>
            <li><a href="index.html">View Store</a></li>
        </ul>
    </nav>

    <main class="admin-offers-container">
        <div class="section-header">
            <h2 style="color: gold;">Offer Management</h2>
            <p>Select products to feature on the "Offer For You" page.</p>
        </div>

        <table class="offers-table">
            <thead>
                <tr>
                    <th>Product</th>
                    <th style="width: 140px;">Was Price (Cut)</th>
                    <th style="width: 140px;">Now Price (Sale)</th>
                    <th style="width: 200px;">Offer Reason</th>
                    <th style="width: 100px; text-align: center;">On Sale?</th>
                </tr>
            </thead>
            <tbody id="offersList">
                <!-- Products injected by JS -->
            </tbody>
        </table>
    </main>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <script src="data.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const offersList = document.getElementById('offersList');

            async function renderOffersAdmin(preFetchedProducts = null) {
                const products = preFetchedProducts || await getProducts();
                offersList.innerHTML = '';

                products.forEach(product => {
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td>
                            <div style="display: flex; align-items: center; gap: 10px;">
                                <img src="${product.image}" style="width: 40px; height: 40px; border-radius: 5px; object-fit: cover;">
                                <strong>${product.name}</strong>
                            </div>
                        </td>
                        <td>
                            <input type="number" class="input-edit" style="width: 110px;" value="${product.originalPrice || product.price}" 
                                onchange="updateOfferDetail(${product.id}, 'originalPrice', this.value)">
                        </td>
                        <td>
                            <input type="number" class="input-edit" style="width: 110px;" value="${product.price}" 
                                onchange="updateOfferDetail(${product.id}, 'price', this.value)">
                        </td>
                        <td>
                            <input type="text" class="input-edit" style="width: 100%;" value="${product.offerReason || ''}" 
                                placeholder="e.g. Eid Sale"
                                onchange="updateOfferDetail(${product.id}, 'offerReason', this.value)">
                        </td>
                        <td style="text-align: center;">
                            <label class="toggle-switch">
                                <input type="checkbox" ${product.onSale ? 'checked' : ''} onchange="toggleSale(${product.id}, this.checked)">
                                <span class="slider"></span>
                            </label>
                        </td>
                    `;
                    offersList.appendChild(row);
                });
            }

            // Real-time listener
            onProductsChange((updatedProducts) => {
                renderOffersAdmin(updatedProducts);
            });

            window.updateOfferDetail = async (id, field, value) => {
                let products = await getProducts();
                const product = products.find(p => p.id == id);
                if (product) {
                    product[field] = (field === 'originalPrice' || field === 'price') ? parseInt(value) : value;
                    await saveProducts(products);
                }
            };

            window.toggleSale = async (id, isSale) => {
                let products = await getProducts();
                const product = products.find(p => p.id == id);
                if (product) {
                    product.onSale = isSale;
                    await saveProducts(products);
                }
            };

            await renderOffersAdmin();
        });
    </script>
</body>

</html>
