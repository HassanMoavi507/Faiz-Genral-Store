<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POS Billing | Faiz Store</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        .pos-container {
            padding: 40px 5%;
            display: grid;
            grid-template-columns: 1.5fr 1fr;
            gap: 30px;
        }

        .pos-card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 25px;
            border: 1px solid var(--glass-border);
        }

        .search-results {
            margin-top: 15px;
            max-height: 300px;
            overflow-y: auto;
            background: #252a35;
            border-radius: 10px;
        }

        .search-item {
            padding: 10px 15px;
            border-bottom: 1px solid var(--glass-border);
            cursor: pointer;
            display: flex;
            justify-content: space-between;
        }

        .search-item:hover {
            background: rgba(16, 185, 129, 0.1);
        }

        .bill-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        .bill-table th {
            text-align: left;
            color: var(--primary-color);
            padding-bottom: 10px;
            border-bottom: 1px solid var(--glass-border);
        }

        .bill-table td {
            padding: 10px 0;
            border-bottom: 1px solid var(--glass-border);
        }

        .quantity-input {
            width: 50px;
            background: #1a1e26;
            border: 1px solid var(--glass-border);
            color: white;
            border-radius: 5px;
            text-align: center;
        }

        .total-section {
            margin-top: 20px;
            text-align: right;
            font-size: 1.5rem;
            font-weight: 800;
        }

        .btn-print {
            background: var(--accent-gradient);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 12px;
            font-weight: 700;
            width: 100%;
            cursor: pointer;
            margin-top: 20px;
        }

        /* Print Styles - Optimized for 3-inch Thermal Printer (80mm) */
        @media print {
            body * {
                visibility: hidden;
            }

            #receiptPrintArea,
            #receiptPrintArea * {
                visibility: visible;
            }

            #receiptPrintArea {
                position: absolute;
                left: 0;
                top: 0;
                width: 80mm;
                color: black;
                background: white;
                padding: 5mm;
                font-family: 'Courier New', Courier, monospace;
                font-size: 12px;
            }

            .no-print {
                display: none !important;
            }

            @page {
                margin: 0;
                size: 80mm auto;
            }

            .pos-container {
                display: none;
            }
        }
    </style>
</head>

<body class="dark-theme">
    <nav class="navbar" style="position: static; margin-bottom: 20px;">
        <div class="logo">
            <img src="logo.png" alt="Faiz Store Logo" style="height: 40px; margin-right: 10px;">
            Faiz <span>Store</span> <small style="font-size: 0.8rem; margin-left: 10px; opacity: 0.7;">POS
                Billing</small>
        </div>
        <ul class="nav-links">
            <li><a href="admin.html">Inventory</a></li>
            <li><a href="admin_orders.html">Orders</a></li>
            <li><a href="index.html">View Store</a></li>
        </ul>
    </nav>

    <div class="pos-container">
        <div class="pos-card">
            <h3>Add Products</h3>
            <input type="text" id="posSearch" placeholder="Search by name..."
                style="width: 100%; padding: 12px; border-radius: 10px; background: #252a35; border: 1px solid var(--glass-border); color: white; margin-top: 15px;">
            <div class="search-results" id="searchResults"></div>

            <table class="bill-table">
                <thead>
                    <tr>
                        <th>Item</th>
                        <th>Price</th>
                        <th>Qty</th>
                        <th>Total</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody id="billItems"></tbody>
            </table>
        </div>

        <div class="pos-card">
            <h3>Bill Summary</h3>
            <div id="receiptPrintArea">
                <div style="text-align: center; border-bottom: 1px dashed black; padding-bottom: 10px;">
                    <h2 style="margin: 0;">Faiz Store</h2>
                    <p style="margin: 5px 0;">Premium Cosmetics & Perfumes</p>
                    <p id="billDate" style="margin: 5px 0;"></p>
                </div>
                <table style="width: 100%; margin-top: 10px; border-collapse: collapse;">
                    <thead>
                        <tr style="border-bottom: 1px solid black;">
                            <th style="text-align: left;">Item</th>
                            <th style="text-align: right;">Qty</th>
                            <th style="text-align: right;">Total</th>
                        </tr>
                    </thead>
                    <tbody id="printableItems"></tbody>
                </table>
                <div style="border-top: 1px dashed black; margin-top: 10px; padding-top: 10px; text-align: right;">
                    <strong>Grand Total: Rs. <span id="billTotalDisplay">0</span></strong>
                </div>
                <div style="text-align: center; margin-top: 15px; font-size: 10px;">
                    <p>Thank you for shopping at Faiz Store!</p>
                </div>
            </div>
            <button class="btn-print" id="printBill">Print Receipt (3-inch)</button>
            <button class="btn-primary" id="clearBill" style="width: 100%; background: #444; margin-top: 10px;">Clear
                Bill</button>
        </div>
    </div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <script src="data.js"></script>
    <script src="billing.js"></script>
</body>

</html>
