<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offers For You | Faiz Store</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Great+Vibes&display=swap"
        rel="stylesheet">
    <style>
        .offers-hero {
            padding: 100px 5% 50px;
            text-align: center;
            background: radial-gradient(circle at 50% 50%, rgba(16, 185, 129, 0.15) 0%, transparent 70%);
        }

        .offers-title {
            font-family: 'Great Vibes', cursive;
            font-size: 5rem;
            color: var(--primary-color);
            margin-bottom: 1rem;
            text-shadow: 0 0 20px rgba(16, 185, 129, 0.3);
        }

        .offers-subtitle {
            font-size: 1.5rem;
            color: var(--text-muted);
            margin-bottom: 3rem;
        }

        .sale-badge {
            position: absolute;
            top: 15px;
            left: 15px;
            background: gold;
            color: #000;
            padding: 5px 15px;
            border-radius: 30px;
            font-weight: 800;
            font-size: 0.8rem;
            z-index: 10;
            box-shadow: 0 5px 15px rgba(212, 175, 55, 0.4);
        }
    </style>
</head>

<body class="dark-theme">
    <nav class="navbar">
        <div class="logo">
            <img src="logo.png" alt="Faiz Store Logo" style="height: 50px; margin-right: 10px;">
            Faiz <span>Store</span>
        </div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="offers.html" class="active">Offers</a></li>
            <li id="navAdmin" style="display: none;"><a href="admin.html">Admin</a></li>
        </ul>
        <div class="cart-icon" id="cartToggle">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="9" cy="21" r="1" />
                <circle cx="20" cy="21" r="1" />
                <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6" />
            </svg>
            <span class="cart-count">0</span>
        </div>
    </nav>

    <header class="offers-hero">
        <h1 class="offers-title">Offer For You</h1>
        <p class="offers-subtitle">Exclusive deals on your favorite products</p>
    </header>

    <main class="product-container">
        <div class="product-grid" id="offersGrid">
            <!-- Filtered products will be injected here -->
        </div>
    </main>

    <aside class="cart-sidebar" id="cartSidebar">
        <div class="cart-header">
            <h3>Shopping Cart</h3>
            <button class="close-cart" id="closeCart">&times;</button>
        </div>
        <div class="cart-items" id="cartItems"></div>
        <div class="cart-footer">
            <div class="total-price">
                <span>Total:</span>
                <span id="cartTotal">Rs. 0</span>
            </div>
            <button class="btn-checkout" id="checkoutBtn">Checkout Now</button>
        </div>
    </aside>

    <div class="overlay" id="overlay"></div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <script src="data.js"></script>
    <script src="app.js"></script>
    <script>
        // Custom rendering for offers page
        async function renderOffers(preFetchedProducts = null) {
            const products = preFetchedProducts || await getProducts();
            const offersGrid = document.getElementById('offersGrid');
            offersGrid.innerHTML = '';

            const saleProducts = products.filter(p => p.onSale);

            if (saleProducts.length === 0) {
                offersGrid.innerHTML = '<p style="grid-column: 1/-1; text-align: center; color: var(--text-muted); padding: 2rem;">No special offers available right now. Check back soon!</p>';
                return;
            }

            saleProducts.forEach(product => {
                const original = product.originalPrice || product.price;
                const current = product.price;
                const savings = original - current;

                const card = document.createElement('div');
                card.className = 'product-card';
                card.style.cursor = 'pointer';
                card.onclick = (e) => {
                    if (e.target.tagName !== 'BUTTON') {
                        window.open(`product.html?id=${product.id}`, '_blank', 'width=1100,height=800');
                    }
                };
                card.innerHTML = `
                    <span class="sale-badge">SALE</span>
                    <img src="${product.image}" alt="${product.name}" class="product-image">
                    <div class="product-info">
                        <span class="product-tag">${product.category}</span>
                        <h3 class="product-title">${product.name}</h3>
                        ${product.offerReason ? `<p style="font-size: 0.8rem; color: gold; margin-bottom: 8px; font-weight: 600;">✨ ${product.offerReason}</p>` : ''}
                        <div class="product-price-row">
                            <div style="display: flex; flex-direction: column;">
                                ${savings > 0 ? `<span style="color: var(--text-muted); font-size: 0.85rem;">Was: <span style="text-decoration: line-through red;">Rs. ${original.toLocaleString()}</span></span>` : ''}
                                <span class="product-price" style="color: #fff; font-size: 1.3rem;">Now: Rs. ${current.toLocaleString()}</span>
                                ${savings > 0 ? `<span style="background: rgba(76, 175, 80, 0.1); color: #4CAF50; font-size: 0.75rem; font-weight: 700; padding: 2px 6px; border-radius: 4px; margin-top: 4px; width: fit-content;">Save Rs. ${savings.toLocaleString()}</span>` : ''}
                            </div>
                            <button class="btn-add-cart" onclick="event.stopPropagation(); addToCart(${product.id})">Add to Cart</button>
                        </div>
                    </div>
                `;
                offersGrid.appendChild(card);
            });
        }

        // Real-time listener
        onProductsChange((updatedProducts) => {
            renderOffers(updatedProducts);
        });

        // Initial render
        renderOffers();
    </script>
</body>

</html>
